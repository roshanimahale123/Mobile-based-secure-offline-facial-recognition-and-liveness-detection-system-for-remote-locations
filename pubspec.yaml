name: facesecure
description: Advanced offline facial recognition and liveness detection system.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1
  state_notifier: ^1.0.0

  # Camera & Image Processing
  camera: ^0.10.5+9
  image: ^4.1.7

  # AI / TFLite
  tflite_flutter: ^0.11.0
  google_mlkit_face_detection: ^0.11.1
  google_mlkit_commons: ^0.8.1

  # Database & Storage
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Security
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # UI
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Networking
  http: ^1.6.0
  dio: ^5.9.2
  connectivity_plus: ^5.0.2

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Utilities
  get_it: ^7.7.0
  logger: ^2.7.0
  uuid: ^4.5.3
  crypto: ^3.0.7
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/models/
    - assets/lottie/